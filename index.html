<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Practice Hub – Interactive Drills</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { margin:0; font-family:'Inter',sans-serif; background:#0f0f11; color:#eee; }
    #login { position:fixed; inset:0; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
    #games { display:none; padding:2rem; }
    #search { width:90%; max-width:600px; padding:1rem; margin:1rem auto; display:block; background:#222; border:none; border-radius:8px; color:white; font-size:1.1rem; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:1.5rem; }
    .game { background:#1a1a2e; border-radius:12px; overflow:hidden; cursor:pointer; transition:0.2s; }
    .game:hover { transform:scale(1.05); box-shadow:0 0 20px #00aaff; }
    .game img { width:100%; height:140px; object-fit:cover; }
    .game p { margin:10px 0; text-align:center; }
    #back { position:fixed; top:15px; right:15px; padding:12px 24px; background:#c00; color:white; border:none; border-radius:8px; cursor:pointer; z-index:10000; display:none; }
    #admin { position:fixed; bottom:20px; right:20px; width:50px; height:50px; background:#333; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:24px; cursor:pointer; z-index:999; }
    iframe { position:fixed; inset:0; width:100%; height:100%; border:none; z-index:999; display:none; }
  </style>
</head>
<body>

<div id="login">
  <h1>Math Practice Hub</h1>
  <p>Teacher & Student Access Only</p>
  <input id="user" placeholder="Username" style="padding:12px; margin:8px; width:320px; background:#222; color:white; border:none; border-radius:8px;">
  <input id="pass" type="password" placeholder="Password" style="padding:12px; margin:8px; width:320px; background:#222; color:white; border:none; border-radius:8px;">
  <button onclick="checkLogin()" style="padding:12px 30px; background:#0066ff; color:white; border:none; border-radius:8px; cursor:pointer;">Login</button>
  <p id="error" style="color:red; margin-top:10px;"></p>
</div>

<div id="games">
  <input type="text" id="search" placeholder="Search games..." onkeyup="filterGames()">
  <div class="grid" id="grid"></div>
  <button id="back" onclick="closeGame()">Back to Hub</button>
  <div id="admin" onclick="showAdmin()">⚙️</div>
</div>

<iframe id="frame"></iframe>

<script>
function checkLogin() {
  if (document.getElementById('user').value === 'elijiah' && document.getElementById('pass').value === 'elijiah2026') {
    document.getElementById('login').style.display = 'none';
    document.getElementById('games').style.display = 'block';
    loadAllGames();
  } else {
    document.getElementById('error').textContent = 'Wrong credentials – contact your teacher.';
  }
}

function filterGames() {
  let term = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.game').forEach(g => {
    g.style.display = g.textContent.toLowerCase().includes(term) ? '' : 'none';
  });
}

function loadGame(url) {
  document.getElementById('frame').src = url;
  document.getElementById('frame').style.display = 'block';
  document.getElementById('back').style.display = 'block';
}

function closeGame() {
  document.getElementById('frame').style.display = 'none';
  document.getElementById('back').style.display = 'none';
  document.getElementById('frame').src = '';
}

function showAdmin() {
  const code = prompt('Enter admin code:');
  if (code === 'elijiah2026') alert('Admin unlocked! To add games: upload new files on GitHub and commit.');
}

function loadAllGames() {
  // CHANGE THESE PATHS IF YOUR GAMES ARE IN DIFFERENT FOLDERS
  const games = [
    // Add as many as you want — here are examples from most packs
    {name:'Slope', url:'html5/slope/index.html', thumb:'thumbnails/slope.png'},
    {name:'Run 3', url:'html5/run3/index.html', thumb:'thumbnails/run3.png'},
    {name:'Tunnel Rush', url:'html5/tunnel-rush/index.html', thumb:'thumbnails/tunnel-rush.png'},
    // Keep adding more lines like this (copy names from your uploaded folders)
  ];
  
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  games.forEach(g => {
    let div = document.createElement('div');
    div.className = 'game';
    div.innerHTML = `<img src="${g.thumb}" alt="${g.name}"><p>${g.name}</p>`;
    div.onclick = () => loadGame(g.url);
    grid.appendChild(div);
  });
}
</script>
</body>
</html>
